name: Build and Test

on:
  workflow_call:
    inputs:
      context_path:
        required: true
        type: string
      tool_name:
        required: true
        type: string
      version:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@main
      - uses: docker/setup-buildx-action@master

      - name: Check for Builder Stage
        id: check-builder
        run: |
          if grep -qi "AS builder" "${{ inputs.context_path }}/Dockerfile"; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build Builder Stage
        if: steps.check-builder.outputs.exists == 'true'
        uses: docker/build-push-action@master
        with:
          context: ${{ inputs.context_path }}
          target: builder
          load: true
          tags: ${{ inputs.tool_name }}:builder
          cache-from: type=gha,scope=${{ inputs.tool_name }}
          cache-to: type=gha,mode=max,scope=${{ inputs.tool_name }}

      - name: Build App Stage
        uses: docker/build-push-action@master
        with:
          context: ${{ inputs.context_path }}
          target: app
          load: true
          tags: ${{ inputs.tool_name }}:app
          cache-from: type=gha,scope=${{ inputs.tool_name }}

      - name: Build to Test Stage
        uses: docker/build-push-action@master
        with:
          context: ${{ inputs.context_path }}
          target: test
          load: true
          tags: ${{ inputs.tool_name }}:test
          cache-from: type=gha,scope=${{ inputs.tool_name }}
      
      - name: Compare Image Sizes
        run: |
          echo "### Image Size Report: ${{ inputs.tool_name }} ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "| Stage | Tag | Size |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|------|" >> $GITHUB_STEP_SUMMARY
          
          # Function to add row to summary
          add_row() {
            local stage=$1
            local tag="${{ inputs.tool_name }}:$2"
            local size=$(docker images --format "{{.Size}}" "$tag")
            echo "| $stage | \`$tag\` | $size |" >> $GITHUB_STEP_SUMMARY
          }

          if [ "${{ steps.check-builder.outputs.exists }}" == "true" ]; then
            add_row "Builder" "builder"
          fi
          add_row "App (Production)" "app"
          add_row "Test (Functional)" "test"          
          docker run --rm $IMAGE ps --help

      - name: Validate Metadata Labels
        run: |
          IMAGE="${{ inputs.tool_name }}:app"
          REQUIRED_LABELS=(
            "org.opencontainers.image.created"
            "org.opencontainers.image.base.name"
            "org.opencontainers.image.title"
            "org.opencontainers.image.version"
            "org.opencontainers.image.revision"
            "org.opencontainers.image.description"
            "org.opencontainers.image.url"
            "org.opencontainers.image.documentation"
            "org.opencontainers.image.source"
            "org.opencontainers.image.licenses"
            "org.opencontainers.image.authors"
            "dockerfile.version"
          )
          FAILED=0
          for label in "${REQUIRED_LABELS[@]}"; do
            VALUE=$(docker inspect --format '{{ index .Config.Labels "'$label'"}}' "$IMAGE")
            if [ -z "$VALUE" ] || [ "$VALUE" == "<no value>" ]; then
              echo "Error: Label '$label' is missing from the app stage."
              FAILED=1
            fi
          done
          if [ "$FAILED" -eq 1 ]; then exit 1; fi

      - name: Validate Working Directory
        run: |
          IMAGE="${{ inputs.tool_name }}:app"
          WORKDIR=$(docker inspect --format '{{.Config.WorkingDir}}' "$IMAGE")
          
          if [ "$WORKDIR" != "/data" ]; then
            echo "Error: WORKDIR is set to '$WORKDIR'. It must be set exactly to /data."
            exit 1
          else
            echo "Success: WORKDIR is correctly set to /data"
          fi

      - name: Validate Non-Root User
        run: |
          IMAGE="${{ inputs.tool_name }}:app"
          # This captures the USER value from the image metadata
          USER_VAL=$(docker inspect --format '{{.Config.User}}' "$IMAGE")
          
          # Check for empty, root, or UID 0
          if [ -z "$USER_VAL" ] || [ "$USER_VAL" == "root" ] || [ "$USER_VAL" == "0" ] || [ "$USER_VAL" == "0:0" ]; then
            echo "Error: Container user is '$USER_VAL'. It must be a non-root user."
            exit 1
          else
            echo "Success: Container runs as non-root user: $USER_VAL"
          fi

      - name: Validate Nextflow Dependencies
        run: |
          IMAGE="${{ inputs.tool_name }}:app"
          
          # List of essential binaries for Nextflow runtime
          NEXTFLOW_DEPS=("bash" "ps" "hostname" "grep" "sed")
          FAILED=0

          echo "Checking Nextflow dependencies in: $IMAGE"
          echo "------------------------------------------------"

          for cmd in "${NEXTFLOW_DEPS[@]}"; do
            if ! docker run --rm --entrypoint /bin/sh "$IMAGE" -c "command -v $cmd" > /dev/null 2>&1; then
              echo "Error: Nextflow dependency '$cmd' is missing from the app stage."
              FAILED=1
            else
              echo "Success: '$cmd' is installed."
            fi
          done

          if [ "$FAILED" -eq 1 ]; then
            echo "Critical: This image is missing utilities required by Nextflow."
            echo "Tip: Install 'procps' (for ps) and 'bash' in your Dockerfile."
            exit 1
          fi

      - name: Run Trivy Vulnerability Scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.tool_name }}:app
          format: 'table'
          exit-code: '1' # Fails the build if vulnerabilities are found
          ignore-unfixed: true # Focus only on things your team can actually fix
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'
