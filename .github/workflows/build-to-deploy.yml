# This called workflow builds a docker container, targeting the "app" stage and pushes the image to Docker Hub and Quay.

name: Build and deploy image

on:
  workflow_call:
    secrets:
      docker_username:
        required: true
      docker_access_token:
        required: true
      quay_username:
        required: false
      quay_robot_token:
        required: false
    inputs:
      path_to_context:
        required: true
        type: string
      dockerfile_name:
        default: Dockerfile
        required: false
        type: string
      repository_name:
        default: staphb
        required: false
        type: string
      cache:
        required: false
        type: string
      container_name:
        required: true
        type: string
      tag:
        required: false
        default: latest
        type: string
      push_quay:
        default: true
        required: false
        type: boolean
      push_latest_tag:
        default: true
        required: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@main
        with:
          lfs: true

      - name: Checkout LFS objects
        run: git lfs checkout

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@master

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@master
        with:
          images: |
            ${{ inputs.repository_name }}/${{ inputs.container_name }}
            ${{ inputs.push_quay && format('quay.io/{0}/{1}', inputs.repository_name, inputs.container_name) || '' }}
          tags: |
            type=raw,value=${{ inputs.tag }}
            type=raw,value=latest,enable=${{ inputs.push_latest_tag }}

      - name: Login to DockerHub
        uses: docker/login-action@master
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_access_token }}

      - name: Login to Quay
        if: ${{ inputs.push_quay }}
        uses: docker/login-action@master
        with:
          registry: quay.io
          username: ${{ secrets.quay_username }}
          password: ${{ secrets.quay_robot_token }}

      - name: Build and push
        id: docker_build
        uses: docker/build-push-action@master
        with:
          context: ${{ inputs.path_to_context }}
          file: ${{ inputs.path_to_context }}/${{ inputs.dockerfile_name }}
          target: app
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}

      - name: Update Docker Hub README
        if: ${{ inputs.push_latest_tag }}
        continue-on-error: true
        run: |
          README_PATH="${{ inputs.path_to_context }}/README.md"
          if [ -f "$README_PATH" ]; then
            echo "Attempting to update Docker Hub description for ${{ inputs.container_name }}..."
            
            # Get JWT Token
            TOKEN=$(curl -s -H "Content-Type: application/json" -X POST \
              -d '{"username": "${{ secrets.docker_username }}", "password": "${{ secrets.docker_access_token }}"}' \
              https://hub.docker.com/v2/users/login/ | jq -r .token)
            
            if [ "$TOKEN" != "null" ]; then
              RESPONSE=$(jq -n --rawfile readme "$README_PATH" '{full_description: $readme}' | \
                curl -s -o /dev/null -w "%{http_code}" -X PATCH \
                -H "Authorization: JWT $TOKEN" \
                -H "Content-Type: application/json" \
                -d @- \
                "https://hub.docker.com/v2/repositories/${{ inputs.repository_name }}/${{ inputs.container_name }}/")
              
              if [ "$RESPONSE" == "200" ]; then
                echo "Successfully updated Docker Hub README."
              else
                echo "Failed to update Docker Hub README. Status code: $RESPONSE"
                echo "This is likely due to the bot account lacking 'Delete/Admin' permissions."
              fi
            else
              echo "Failed to authenticate with Docker Hub API."
            fi
          fi

      - name: Update Quay README
        if: ${{ inputs.push_quay && inputs.push_latest_tag }}
        continue-on-error: true
        run: |
          README_PATH="${{ inputs.path_to_context }}/README.md"
          if [ -f "$README_PATH" ]; then
            echo "Attempting to update Quay description for ${{ inputs.container_name }}..."
            
            README_CONTENT=$(cat "$README_PATH")
            JSON_BODY=$(jq -n --arg desc "$README_CONTENT" '{description: $desc}')
            
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
              -H "Authorization: Bearer ${{ secrets.quay_robot_token }}" \
              -H "Content-Type: application/json" \
              -d "$JSON_BODY" \
              "https://quay.io/api/v1/repository/${{ inputs.repository_name }}/${{ inputs.container_name }}")
            
            if [ "$RESPONSE" == "200" ]; then
              echo "Successfully updated Quay README."
            else
              echo "Failed to update Quay README. Status code: $RESPONSE"
            fi
          fi

      - name: Image digest
        run: echo ${{ steps.docker_build.outputs.digest }}
