# This called workflow builds a docker container, targeting the "test" stage.

name: Build to test

on:
  workflow_call:
    inputs:
      path_to_context:
        required: true
        type: string
      dockerfile_name:
        default: Dockerfile
        required: false
        type: string
      # Kept as optional to avoid breaking caller workflows, but unused here
      cache:
        required: false
        type: string

jobs:
  build_to_test:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out Repo
        uses: actions/checkout@main

      - name: Set up QEMU
        uses: docker/setup-qemu-action@master
      
      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@master

      - name: Build to test
        id: docker_build_to_test
        uses: docker/build-push-action@master
        with:
          context: ${{ inputs.path_to_context }}
          file: ${{ inputs.path_to_context }}/${{ inputs.dockerfile_name }}
          target: test
          push: false
    

      - name: Image digest
        run: echo ${{ steps.docker_build_to_test.outputs.digest }}
